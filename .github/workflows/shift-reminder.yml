name: Shift Reminder Bot

on:
  schedule:
    # Runs every 5 minutes. GitHub may delay this slightly under load,
    # which the 10-20 minute window in shift_reminder.py accounts for.
    - cron: "*/5 * * * *"
  workflow_dispatch: {}   # lets you manually trigger a run from the Actions tab

jobs:
  send-reminders:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - run: pip install -r requirements.txt

      - run: python shift_reminder.py
        env:
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
          SHEET_ID: ${{ secrets.SHEET_ID }}
          MANAGER_EMAIL: ${{ secrets.MANAGER_EMAIL }}
          DEFAULT_TIMEZONE: ${{ secrets.DEFAULT_TIMEZONE }}   # leave the secret unset to use America/Los_Angeles
