# Save this file as .github/workflows/shift-reminder.yml in your repo.
name: Shift Reminder Bot

on:
  schedule:
    # Runs every 5 minutes, offset to :02/:07/:12/:17... instead of the
    # round :00/:05/:10 marks. GitHub's scheduler is heavily congested at
    # exact round-number times (a huge fraction of all cron jobs on GitHub
    # fire then), which causes runs to be delayed or dropped. Landing a
    # few minutes off that boundary avoids most of that contention.
    # A late/skipped run still isn't a problem — shift_reminder.py is
    # built to keep trying rather than silently miss a reminder.
    - cron: "2-59/5 * * * *"
  workflow_dispatch: {}   # lets you manually trigger a run from the Actions tab

jobs:
  send-reminders:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - run: pip install -r requirements.txt

      - run: python shift_reminder.py
        env:
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
          SHEET_ID: ${{ secrets.SHEET_ID }}
          DEFAULT_TIMEZONE: ${{ secrets.DEFAULT_TIMEZONE }}   # leave the secret unset to use America/Los_Angeles
